<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍩</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gottfrids Munkar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <header class="site-header">
      <img src="content/Gotfrids_munkshop_logotyp.jpg" alt="Gottfrids Munkar logotyp" />
     <h1>Gottfrids Munkar</h1>
    
  
  <section class="cart-wrapper">
  <button
  class="cart-toggle"
  aria-label="Öppna varukorg"
  aria-expanded="false"
  aria-controls="cart"
>
  <img
    src="content/shopping_cart.svg"
    alt=""
    aria-hidden="true"
  >
</button>

 <span class="cart-summary" aria-live="polite">
    <span class="cart-summary-total">0 kr</span>
  </span>
  </section>

<section id="cart" class="cart hidden">
  <h2 id="cart-heading" class="sr-only">Varukorg</h2>

   <div class="cart-content">

  <button class="close-cart" aria-label="Stäng varukorg">✕</button>
  <div id="cart-items" class="cart-items">
    <!-- produkter från js -->
  </div>

  <p class="cart-total">
    Totalt: <span id="cart-total">0 kr</span>
  </p>

 <button id="checkoutToggle" type="button">
  Till kassan
</button>


  <div id="checkoutFormWrapper" class="hidden">
  <!---------Beställningsformulär ----->

<section class="checkout">
  <h2>Beställning</h2>

  <form id="checkoutForm" novalidate>
    <fieldset>
      <legend>Kontaktuppgifter</legend>

      <label for="firstName">Förnamn</label>
      <input type="text" id="firstName" name="firstName" required>

      <label for="lastName">Efternamn</label>
      <input type="text" id="lastName" name="lastName" required>

      <label for="address">Adress</label>
      <input type="text" id="address" name="address" required>

      <label for="postalCode">Postnummer</label>
      <input type="text" id="postalCode" name="postalCode" required>

      <label for="city">Postort</label>
      <input type="text" id="city" name="city" required>

      <label for="doorCode">Portkod (valfritt)</label>
      <input type="text" id="doorCode" name="doorCode">

      <label for="phone">Telefon (mobil)</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="email">E-postadress</label>
      <input type="email" id="email" name="email" required>
    </fieldset>

    <fieldset>
      <legend>Betalsätt</legend>

      <label>
        <input type="radio" name="payment" value="card" required>
        Kort
      </label>

      <label>
        <input type="radio" name="payment" value="invoice">
        Faktura
      </label>
    </fieldset>

    <!-- Faktura -->
    <fieldset id="invoiceFields" hidden>
      <legend>Fakturauppgifter</legend>

      <label for="personnummer">Personnummer (XXXXXX-XXXX)</label>
      <input type="text" id="personnummer" name="personnummer">
    </fieldset>

    <!-- Kort -->
    <fieldset id="cardFields" hidden>
      <legend>Kortuppgifter</legend>

      <label for="cardNumber">Kortnummer</label>
      <input type="text" id="cardNumber" name="cardNumber">

      <label for="cardExpiry">Giltigt t.o.m. (MM/ÅÅ)</label>
      <input type="text" id="cardExpiry" name="cardExpiry">

      <label for="cardCvc">CVC</label>
      <input type="text" id="cardCvc" name="cardCvc">
    </fieldset>

    <fieldset>
      <legend>Övrigt</legend>

      <label for="discount">Rabattkod</label>
      <input type="text" id="discount" name="discount">

      <label>
        <input type="checkbox" id="terms" required>
        Jag godkänner behandling av personuppgifter
      </label>

      <label>
        <input type="checkbox" id="newsletter" checked>
        Jag vill få nyhetsbrev
      </label>
    </fieldset>

    <div class="form-actions">
      <button type="submit" disabled>Skicka beställning</button>
      <button type="reset">Rensa beställning</button>
    </div>
  </form>
</section>
  </div>

</section>
</section>

    </div>
    
    </header>

      <main>
  

<!-- TEST DROPDOWN PÅ FILTER -->
 <section class="controls">

  <label for="filterSelect" class="sr-only">Filtrera produkter</label>
  <select id="filterSelect" class="filter-button">
    <option value="" selected disabled hidden>Filtrera</option>
    <option value="all">Alla</option>
    <option value="plain">Vanlig</option>
    <option value="glazed">Glasyr</option>
    <option value="sugar">Socker</option>
  </select>
</div>

<!-------TEST DROPDOWN PÅ SORTERING--->


<label for="sortSelect" class="sr-only">Sortera produkter</label>
<select id="sortSelect" class="sort-button">
  <option value="" selected disabled hidden>Sortera</option>
  <option value="name">Namn</option>
  <option value="price">Pris (lågt → högt)</option>
  <option value="rating">Betyg (högt → lågt)</option>
  <option value="category">Kategori</option>
</select>
</section>

<section class="products-list" id="products">
  <!-- produkter visas här från js -->
</section>

    </main>
    
    <footer>
      Det här är en footer
    </footer>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
